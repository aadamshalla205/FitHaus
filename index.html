<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// localStorage persistence helpers
function _load(k,fb){try{const s=localStorage.getItem("fh_"+k);return s!==null?JSON.parse(s):fb}catch(e){return fb}}
function _save(k,v){try{localStorage.setItem("fh_"+k,JSON.stringify(v))}catch(e){}}

// imports handled by HTML

const themes = {
  dark: {
    bg:"#0D0D0D",bgCard:"#1A1A1A",bgSecondary:"#141414",bgInput:"#1E1E1E",
    text:"#F5F5F0",textSecondary:"#A0A09A",textMuted:"#6B6B65",
    accent:"#EDE8D0",accentDark:"#D4CFB8",accentSubtle:"rgba(237,232,208,0.08)",accentBorder:"rgba(237,232,208,0.15)",
    border:"rgba(255,255,255,0.06)",success:"#7EC87E",warning:"#E8C55A",danger:"#E87A6A",overlay:"rgba(0,0,0,0.75)",
  },
  light: {
    bg:"#F8F7F3",bgCard:"#FFFFFF",bgSecondary:"#EFEEEA",bgInput:"#FFFFFF",
    text:"#1A1A1A",textSecondary:"#6B6B65",textMuted:"#9E9E96",
    accent:"#8B8573",accentDark:"#6B6558",accentSubtle:"rgba(139,133,115,0.08)",accentBorder:"rgba(139,133,115,0.2)",
    border:"rgba(0,0,0,0.08)",success:"#4A9E4A",warning:"#C4A030",danger:"#C45A4A",overlay:"rgba(0,0,0,0.4)",
  },
};


function ExerciseDiagramPanel({exercise, th}){
  const steps = exercise.steps || [];
  const equipLabels = {barbell:"Barbell",dumbbell:"Dumbbells",cable:"Cable Machine",machine:"Machine",bodyweight:"No Equipment"};
  const equipEmoji = {barbell:"🏋️",dumbbell:"💪",cable:"🔗",machine:"⚙️",bodyweight:"🤸"};
  const muscleEmoji = {chest:"🫁",back:"🔙",shoulders:"🤷",legs:"🦵",biceps:"💪",triceps:"💪",core:"🧘",cardio:"🏃"};

  // Detailed beginner-friendly instructions per exercise
  const detailedGuide = {
    "c1":{setup:"Lie flat on the bench. Feet flat on the floor. Grip the bar slightly wider than shoulder-width. Unrack the bar so it's directly above your chest.",move:"Slowly lower the bar to your mid-chest (around nipple line). Keep your elbows at roughly 45° to your body — not flared out wide. Touch your chest lightly, then press the bar straight back up until your arms are fully extended.",tip:"Keep your shoulder blades squeezed together and pinned to the bench throughout. This protects your shoulders."},
    "c2":{setup:"Set the bench to a 30-45° incline. Sit back, hold one dumbbell in each hand at shoulder height with palms facing forward.",move:"Press both dumbbells up and slightly inward until they almost touch at the top. Then lower them slowly back to shoulder level.",tip:"Don't let the dumbbells drift too far back behind your shoulders — this strains the joint. Control the weight on the way down."},
    "c3":{setup:"Lie flat on a bench holding a dumbbell in each hand directly above your chest. Keep a slight bend in your elbows — imagine hugging a tree.",move:"Open your arms out wide in a big arc until you feel a stretch across your chest. Then squeeze your chest to bring the dumbbells back together overhead.",tip:"This is NOT a pressing motion. Keep that elbow bend constant throughout. Go lighter than you think — this exercise is about the stretch and squeeze."},
    "c5":{setup:"Place your hands on the floor slightly wider than shoulder-width. Extend your legs straight behind you. Your body should form a perfectly straight line from your head to your heels.",move:"Bend your elbows to lower your chest toward the floor. Keep your elbows at about 45° to your body (not flared wide). Push back up to the start position.",tip:"Don't let your hips sag or pike up. Imagine a broomstick along your spine — it should touch your head, upper back, and tailbone at all times."},
    "b1":{setup:"Stand with feet hip-width apart. The bar should be over the middle of your feet. Bend at the hips and knees to grip the bar just outside your shins. Flatten your back, puff your chest out.",move:"Take a big breath, brace your core, then push the floor away with your legs. The bar should travel straight up, staying close to your body. Stand up fully, locking your hips at the top.",tip:"The bar should NEVER drift forward away from your body. Think of it as pushing the floor away rather than pulling the bar up. Keep your back flat — if it rounds, the weight is too heavy."},
    "b2":{setup:"Grab the pull-up bar with an overhand grip (palms facing away), hands slightly wider than shoulder-width. Hang with arms fully extended, shoulders pulled down away from your ears.",move:"Pull yourself up by driving your elbows down toward your hips. Keep pulling until your chin clears the bar. Then lower yourself slowly back to a full hang.",tip:"Don't swing or kip. If you can't do a full pull-up, use a resistance band looped over the bar and under your knees for assistance."},
    "b3":{setup:"Stand with feet shoulder-width apart, holding a barbell with an overhand grip. Hinge forward at your hips until your torso is roughly 45° to the floor. Let the bar hang at arm's length.",move:"Pull the bar up to your lower ribcage, squeezing your shoulder blades together at the top. Lower the bar back down with control.",tip:"Your torso should stay still throughout — don't stand up as you pull. If you're rocking back and forth, the weight is too heavy."},
    "b4":{setup:"Sit at the lat pulldown machine. Adjust the thigh pad so it holds you firmly in place. Grab the bar with a wide overhand grip. Lean back very slightly.",move:"Pull the bar down to your upper chest by driving your elbows down and back. Squeeze your shoulder blades together at the bottom. Then let the bar rise back up slowly with control.",tip:"Don't pull the bar behind your neck — always to the front of your chest. Don't lean way back to cheat the weight down."},
    "s1":{setup:"Stand with feet shoulder-width apart. Hold the barbell at collarbone height, with hands just outside your shoulders. Elbows slightly in front of the bar.",move:"Press the bar straight overhead, moving your head slightly back to let the bar pass your face, then push your head forward once the bar is above. Lock out your arms at the top.",tip:"Squeeze your glutes and brace your core to prevent arching your lower back. If your back arches, the weight is too heavy."},
    "s2":{setup:"Stand upright holding a dumbbell in each hand at your sides, palms facing your body. Have a very slight bend in your elbows.",move:"Raise both arms out to the sides until they're parallel to the floor (like a bird spreading its wings). Pause briefly at the top. Lower slowly back to your sides.",tip:"Lead with your elbows, not your hands. Imagine pouring water out of a jug at the top of the movement. Use lighter weight with perfect form — this exercise doesn't need heavy dumbbells."},
    "l1":{setup:"Position the bar on your upper traps (not your neck). Feet shoulder-width apart, toes pointed slightly outward. Stand tall, brace your core.",move:"Break at the hips and knees simultaneously, sitting down as if into a chair. Go down until your thighs are at least parallel to the floor. Then drive through your whole foot to stand back up.",tip:"Keep your chest up and your knees tracking over your toes (not caving inward). Look at a spot on the wall in front of you to keep your head neutral."},
    "l2":{setup:"Stand holding a barbell at hip height with an overhand grip. Feet hip-width apart. Keep a very slight bend in your knees — they stay at this angle the whole time.",move:"Push your hips backward as if trying to touch a wall behind you. Let the bar slide down the front of your thighs. Go down until you feel a strong stretch in your hamstrings (back of thighs), then drive your hips forward to stand back up.",tip:"This is a HIP HINGE, not a squat. Your knees barely bend. The movement comes almost entirely from your hips going back and forward. Keep the bar close to your legs at all times."},
    "l3":{setup:"Sit in the leg press machine with your back flat against the pad. Place your feet shoulder-width apart on the platform, roughly in the centre.",move:"Release the safety handles. Slowly bend your knees to lower the platform toward you until your knees are at about 90°. Then press the platform back up by driving through your heels.",tip:"NEVER lock your knees fully at the top — keep a slight bend. Don't let your lower back lift off the pad at the bottom. If it does, you're going too deep."},
    "a1":{setup:"Stand with feet shoulder-width apart, holding a barbell at arm's length with an underhand grip (palms facing up).",move:"Keeping your upper arms completely still, curl the bar up toward your shoulders by bending at the elbows. Squeeze at the top, then lower the bar slowly back to the start.",tip:"Pin your elbows to your sides — they should not move forward or backward. If you have to swing your body to get the weight up, it's too heavy."},
    "t1":{setup:"Stand at a cable machine with the pulley set to the highest position. Grab the rope or bar attachment with both hands. Stand close to the machine, elbows pinned at your sides.",move:"Push the handle straight down by straightening your elbows. At the bottom, your arms should be fully extended. Then let the handle rise back up slowly, but only until your forearms are parallel to the floor — no higher.",tip:"Your upper arms and elbows stay glued to your sides the entire time. The only thing moving is your forearms. If your elbows drift forward, the weight is too heavy."},
    "co1":{setup:"Get on the floor face-down. Place your forearms on the ground with elbows directly under your shoulders. Extend your legs straight behind you, resting on your toes.",move:"Lift your body off the ground. Your body should form a perfectly straight line from your head to your heels. Hold this position for the prescribed time.",tip:"Don't let your hips sag toward the floor or pike up toward the ceiling. Squeeze your glutes and brace your core as if someone is about to poke your stomach. Breathe normally — don't hold your breath."},
    "c6":{setup:"Lie on a decline bench with feet secured. Grip the bar slightly wider than shoulder-width. Unrack.",move:"Lower the bar to your lower chest. Press back up to full lockout.",tip:"The decline angle targets the lower chest. Use a spotter when going heavy."},
    "c7":{setup:"Grip parallel bars and lift yourself up. Lean your torso forward about 30 degrees.",move:"Lower your body until you feel a stretch in your chest. Press back up to lockout while maintaining the forward lean.",tip:"The forward lean is what targets the chest. Staying upright shifts work to triceps."},
    "c9":{setup:"Set bench to 30-45 degree incline. Lie back, grip bar slightly wider than shoulders. Unrack.",move:"Lower bar to upper chest. Press back up to lockout.",tip:"The incline targets the upper chest. Don't set the angle too steep or shoulders take over."},
    "c10":{setup:"Sit with back against pad. Place forearms or hands on the pads. Adjust so pads are at chest height.",move:"Bring the pads together in front of your chest, squeezing hard. Return slowly to the stretch position.",tip:"Don't go so far back that your shoulders strain. Stop when you feel a comfortable chest stretch."},
    "c11":{setup:"Lie across a bench so only your upper back rests on it. Hold one dumbbell overhead with both hands, arms slightly bent.",move:"Lower the dumbbell behind your head in an arc until you feel a deep chest stretch. Pull it back over your chest.",tip:"Keep a slight elbow bend throughout. This also works the lats, but focus on the chest stretch and squeeze."},
    "c12":{setup:"Place one end of a barbell in a landmine or corner. Hold the other end at shoulder height with one or both hands.",move:"Press the bar up and forward at an angle. Lower with control.",tip:"The angled pressing path is easier on shoulders than flat pressing. Great for people with shoulder issues."},
    "c13":{setup:"Get in push-up position but place hands together under your chest, forming a diamond shape with thumbs and index fingers.",move:"Lower your chest to your hands. Push back up.",tip:"This variation heavily targets the inner chest and triceps. Harder than regular push-ups."},
    "c14":{setup:"Stand holding a weight plate between your palms at chest height, pressing your hands together.",move:"Press the plate straight out in front of you while squeezing your palms together. Return to chest.",tip:"The constant squeezing tension is what activates the inner chest. Use a light plate (5-10kg)."},
    "c15":{setup:"Lie on the floor with knees bent. Hold dumbbells or barbell above your chest.",move:"Lower until your upper arms touch the floor. Pause briefly, then press back up.",tip:"The floor limits your range of motion, which is useful for building lockout strength and protecting shoulders."},
    "c16":{setup:"Set bench to 30 degrees between cable pulleys (low position). Lie back, grab handles.",move:"Bring handles up and together above upper chest in arc motion. Squeeze. Lower with control.",tip:"Combines the constant tension of cables with the upper chest focus of incline. Superior to dumbbell flyes for many."},
    "b8":{setup:"Underhand grip (palms facing you), shoulder-width. Hang fully extended.",move:"Pull up until chin clears bar. Lower slowly.",tip:"Underhand grip shifts more emphasis to biceps compared to overhand pull-ups."},
    "b9":{setup:"Straddle the bar. Grip the handle or V-grip attachment. Hinge forward, chest up.",move:"Pull the bar to your chest. Squeeze shoulder blades hard at top. Lower with control.",tip:"The neutral grip is easier on shoulders than barbell rows. Great for building thickness."},
    "b10":{setup:"Stand facing cable machine, pulley high. Grip bar with straight arms. Slight forward lean.",move:"Push bar down in an arc to your thighs, keeping arms straight. Squeeze lats. Return slowly.",tip:"Arms stay straight the entire time. This isolates the lats without bicep involvement."},
    "b11":{setup:"Set a bar at waist height. Hang underneath with arms extended, body straight, heels on floor.",move:"Pull your chest up to the bar. Squeeze shoulder blades. Lower with control.",tip:"Bring feet closer to make it harder, farther to make easier."},
    "b12":{setup:"Stand perpendicular to the barbell end. Stagger stance. Grip the barbell end with one hand overhand.",move:"Row the bar to your hip in an arcing motion. Squeeze lat hard. Lower with control.",tip:"The angled pull hits the lats differently than standard rows."},
    "b13":{setup:"Set bench to 30-45 degrees. Lie face-down on the bench. Dumbbells hanging below.",move:"Row both dumbbells up to your ribcage, squeezing shoulder blades. Lower with control.",tip:"The bench support removes all momentum cheating. Pure back contraction. Great for beginners."},
    "b14":{setup:"Set safety pins in rack at knee height. Bar rests on pins. Grip bar, flat back, chest up.",move:"Stand up with the bar from the pin position. Lock out hips. Lower bar back to pins.",tip:"Partial range of motion deadlift. Allows heavier loads for upper back and trap development."},
    "b15":{setup:"Bar on floor. Feet shoulder-width. Bend over until torso is parallel to floor. Grip bar overhand.",move:"Explosively row the bar to your lower chest. Return bar to floor. Each rep starts from dead stop.",tip:"Unlike regular bent-over rows, every rep starts from the floor. More explosive, builds power."},
    "b16":{setup:"Lie across a bench (upper back only). Hold dumbbell overhead with both hands.",move:"Lower dumbbell behind head in an arc. Feel the lat stretch. Pull back over chest.",tip:"Can target either chest or back depending on focus. For back, think about pulling with your lats."},
    "b17":{setup:"Lie face-down on a bench elevated on blocks. Barbell below you. Arms hanging.",move:"Row barbell to the underside of the bench. Squeeze back. Lower with control.",tip:"Zero momentum possible. Pure back contraction. One of the most honest rowing movements."},
    "s6":{setup:"Stand side-on to cable machine. Low pulley. Grab handle with far hand across body.",move:"Raise arm out to the side to shoulder height. Lower with control.",tip:"Cable provides constant tension throughout, unlike dumbbells where tension drops at the bottom."},
    "s7":{setup:"Sit with back supported. Dumbbells at shoulder height, palms forward.",move:"Press dumbbells overhead until arms are extended. Lower to shoulder height.",tip:"Easier on the wrists than barbell pressing. Each arm works independently for balanced development."},
    "s8":{setup:"Adjust seat so handles are at shoulder height. Sit back, grip handles.",move:"Press handles overhead to full extension. Lower with control.",tip:"Machine controls the path, making it safer for beginners. Focus on pushing through the movement."},
    "s9":{setup:"Hold barbell or dumbbells in front of thighs, overhand grip, hands shoulder-width or slightly narrower.",move:"Pull the weight up along your body to chin height. Elbows lead and go higher than hands. Lower with control.",tip:"Use a wider grip if you feel shoulder impingement. Dumbbells allow more natural wrist rotation."},
    "s10":{setup:"Sit facing the machine (opposite direction to chest flyes). Grip handles with arms extended at chest height.",move:"Pull handles back in an arc, squeezing rear delts and upper back. Return slowly.",tip:"Same machine as pec deck flyes, just face the other way. Excellent for rear delt isolation."},
    "s11":{setup:"Start in push-up position, then walk feet toward hands so your hips are high. Body forms an inverted V shape.",move:"Bend elbows to lower your head toward the floor. Push back up.",tip:"A bodyweight alternative to overhead pressing. Elevate feet on a bench to make it harder."},
    "s12":{setup:"Stand with dumbbells at sides. Arms slightly bent.",move:"Raise dumbbells out to sides AND slightly forward (about 30 degrees) to shoulder height. Thumbs point slightly upward. Lower with control.",tip:"Named after Olympic lifter Lu Xiaojun. The slight forward angle and thumb-up position is easier on rotator cuffs than strict lateral raises."},
    "s13":{setup:"Sit on end of bench, lean forward until chest is near thighs. Dumbbells hanging below.",move:"Raise arms out to sides. Squeeze rear delts and upper back. Lower with control.",tip:"The seated position eliminates momentum completely. Great for isolating rear delts."},
    "s14":{setup:"Stand holding a plate at waist height with hands at 9 and 3 o'clock positions.",move:"Raise plate to eye level with straight arms. Lower with control.",tip:"The wide grip on the plate engages the shoulders slightly differently than dumbbells."},
    "l10":{setup:"Bar rests on front of shoulders (clean grip or crossed arms). Elbows high. Feet shoulder-width.",move:"Squat down keeping torso very upright. Drive up through heels.",tip:"More quad-dominant than back squats. Requires good wrist and ankle mobility."},
    "l11":{setup:"Hold a dumbbell or kettlebell at chest height with both hands, close to your body. Feet shoulder-width.",move:"Squat down between your legs, keeping the weight at chest height. Drive up.",tip:"The best squat variation for beginners. The front-loaded weight naturally keeps your torso upright."},
    "l12":{setup:"Wide stance (1.5x shoulder-width), toes pointed out 45 degrees. Grip bar between your legs, arms straight down.",move:"Drive through floor, extending hips and knees. Stand tall, lock hips.",tip:"Wider stance shifts emphasis to inner thighs and glutes compared to conventional deadlift."},
    "l13":{setup:"Stand facing a bench or box at knee height. Hold dumbbells at sides.",move:"Step up with one foot, driving through that heel to stand on top. Step down with control. Alternate or do all reps on one side.",tip:"Don't push off the back foot. All the work should come from the leg on the box."},
    "l14":{setup:"Stand on platform with back against pad. Shoulders under the shoulder pads. Feet shoulder-width.",move:"Lower by bending knees to about 90 degrees. Press up through feet.",tip:"Very quad-dominant. Foot placement affects emphasis: high and wide = more glutes, low and narrow = more quads."},
    "l15":{setup:"Sit down, place balls of feet on platform, knees under pad.",move:"Push up onto toes. Hold at top. Lower heels for full stretch.",tip:"This targets the soleus (deeper calf muscle), while standing calf raises target the gastrocnemius."},
    "l16":{setup:"Lie on your back, knees bent, feet flat on floor, arms at sides.",move:"Push through heels, lift hips until body forms a straight line from shoulders to knees. Squeeze glutes. Lower.",tip:"A simpler version of hip thrusts. Great warm-up exercise and beginner glute builder."},
    "l17":{setup:"Kneel on the floor. Have someone hold your ankles, or hook feet under a bench or pad.",move:"Slowly lower your body forward from the knees, keeping hips extended. Lower as far as you can control. Push yourself back up (use hands on floor to assist if needed).",tip:"Extremely challenging. One of the best hamstring exercises that exist. Use hand assistance until strong enough for full reps."},
    "l18":{setup:"Stand on one leg holding a dumbbell in the opposite hand. Slight knee bend on standing leg.",move:"Hinge at hip, extending free leg behind you as counterbalance. Lower dumbbell toward floor. Drive hip forward to stand.",tip:"Excellent for balance and correcting side-to-side strength imbalances. Start with bodyweight only."},
    "l19":{setup:"Stand tall, hold something for balance. Rise onto toes.",move:"Lean backward as you bend your knees, lowering until thighs are parallel. Drive back up through quads.",tip:"Extreme quad isolation. The backward lean keeps all tension on the quadriceps. Very challenging."},
    "l20":{setup:"Bar on upper traps in Smith machine. Feet slightly forward of the bar.",move:"Squat down to parallel or below. Drive back up.",tip:"The fixed bar path makes it safer for beginners. Good for learning squat movement pattern."},
    "l21":{setup:"Sit in leg press. Place just the balls of your feet on the bottom edge of the platform. Legs nearly straight.",move:"Push through toes to extend ankle. Lower heels for stretch.",tip:"An alternative to standing calf raises that allows heavier loading with less balance requirement."},
    "l22":{setup:"Bar on upper traps (like squat position). Feet shoulder-width. Slight knee bend.",move:"Hinge forward at hips until torso is nearly parallel to floor. Drive hips forward to stand.",tip:"Similar to RDL but bar is on your back. Targets posterior chain heavily. Start very light to learn the movement."},
    "a5":{setup:"Sit on incline bench (45 degrees). Arms hang straight down with dumbbells, palms forward.",move:"Curl dumbbells up without moving upper arms. Lower with control.",tip:"The incline puts a deep stretch on the biceps at the bottom. Excellent for long head development."},
    "a6":{setup:"Low pulley. Grip bar underhand. Stand upright.",move:"Curl bar up, elbows pinned. Squeeze at top. Lower with control.",tip:"Cable provides constant tension throughout, unlike dumbbells where tension drops at the top."},
    "a7":{setup:"Sit on bench, lean forward, rest elbow against inner thigh. Hold dumbbell.",move:"Curl dumbbell up, squeezing bicep hard at top. Lower slowly.",tip:"The isolation is extreme. Perfect for mind-muscle connection and peak contraction."},
    "a8":{setup:"Lie chest-down on an incline bench. Arms hang straight down toward floor.",move:"Curl weight up. The bench prevents any swinging or cheating. Lower with control.",tip:"Gravity works against you through the full range. Incredible peak contraction."},
    "a9":{setup:"Hold bar or dumbbells with an overhand grip (palms facing down).",move:"Curl up keeping the overhand grip. Lower with control.",tip:"Targets the brachioradialis and forearms more than regular curls. Builds forearm size."},
    "a10":{setup:"Stand with dumbbells at sides, neutral grip.",move:"Curl one dumbbell across your body toward the opposite shoulder. Lower. Alternate arms.",tip:"Targets the brachialis (muscle under the bicep) which pushes the bicep peak higher."},
    "a11":{setup:"Grip the EZ bar at the angled portions. Underhand grip. Arms at sides.",move:"Curl the bar up to shoulders. Squeeze. Lower with control.",tip:"The angled grip is easier on the wrists than a straight bar. Most gyms have these."},
    "a12":{setup:"Low pulley, rope attachment. Grip rope with neutral (hammer) grip. Stand upright.",move:"Curl rope up keeping neutral grip. Squeeze. Lower with control.",tip:"Constant cable tension combined with neutral grip. Excellent forearm and outer bicep builder."},
    "t6":{setup:"Hinge forward, upper arm parallel to torso. Elbow bent 90 degrees. Dumbbell in hand.",move:"Extend your arm straight back until fully locked out. Squeeze. Return to 90 degrees.",tip:"Don't swing. The squeeze at full extension is everything. Use light weight."},
    "t7":{setup:"Face away from cable machine, low pulley. Grip rope overhead. Step forward for tension. Lean slightly forward.",move:"Extend arms overhead by straightening elbows. Squeeze. Return with control.",tip:"The cable provides constant tension that dumbbells can't match for this movement."},
    "t9":{setup:"Hands on edge of bench behind you, fingers forward. Legs extended or bent.",move:"Lower by bending elbows to about 90 degrees. Press back up.",tip:"Keep body close to the bench. Extend legs for more difficulty, bend knees for easier."},
    "t10":{setup:"Lie on bench. Bar above chest with narrow grip. Similar to skull crusher starting position.",move:"Lower the bar toward your chin/upper chest in a hybrid between a skull crusher and close-grip bench. Press back up.",tip:"A hybrid movement popularised by powerlifter JM Blakley. Very effective for tricep strength and size."},
    "t11":{setup:"High pulley, single handle. Grip with one hand. Elbow pinned at side.",move:"Push handle down to full extension. Squeeze tricep. Return with control.",tip:"Single arm allows you to identify and fix strength imbalances between arms."},
    "t12":{setup:"Set the counterweight to assist your bodyweight. Grip handles. Kneel on pad.",move:"Lower your body until upper arms parallel. Press back up.",tip:"Perfect for building up to bodyweight dips. Gradually reduce the assistance weight over time."},
    "co6":{setup:"Kneel on floor. Grip ab wheel handles. Wheel directly under shoulders.",move:"Roll wheel forward, extending your body. Go as far as you can control. Pull back using abs.",tip:"Don't let lower back sag. If you can't control the extension, don't go as far. Build up gradually."},
    "co7":{setup:"Lie on back. Arms straight up toward ceiling. Knees bent 90 degrees, shins parallel to floor.",move:"Extend opposite arm and leg simultaneously (right arm back, left leg out). Return. Switch sides.",tip:"Press lower back into floor throughout. If back arches, you've gone too far."},
    "co8":{setup:"Lie on your side. Prop up on forearm, elbow under shoulder. Stack feet.",move:"Lift hips off floor. Body forms straight line. Hold.",tip:"Don't let hips sag. Squeeze obliques to hold the position. Breathe normally."},
    "co9":{setup:"Lie on back, hands behind head. Knees bent, feet off floor.",move:"Bring right elbow toward left knee while extending right leg. Switch sides in a pedaling motion.",tip:"Don't pull on your neck. Rotation should come from ribcage, hands just support your head."},
    "co10":{setup:"Stand sideways to cable at chest height. Grip handle at chest with both hands. Step out for tension.",move:"Press hands straight forward, hold 2-3 seconds resisting the pull. Return to chest.",tip:"The core works to RESIST rotation. This builds functional core stability that transfers to all movements."},
    "co11":{setup:"Lie flat on back, hands under hips for support. Legs straight.",move:"Raise legs to vertical (90 degrees). Lower slowly without touching floor.",tip:"Keep lower back pressed to floor. If it arches, bend your knees slightly."},
    "co12":{setup:"Cable at high position. Stand sideways. Grip handle with both hands above shoulder.",move:"Pull handle diagonally down across body to opposite hip, rotating torso. Return with control.",tip:"Power comes from core rotation, not arms. Keep arms relatively straight."},
    "co13":{setup:"Pick up heavy dumbbells, one in each hand. Stand tall. Shoulders back and down.",move:"Walk forward with short, controlled steps. Keep torso completely upright. Don't lean or sway.",tip:"Builds incredible grip strength, core stability, and overall functional strength. Walk 30-40 metres per set."},
    "co14":{setup:"Lie on back. Arms extended overhead. Legs straight.",move:"Lift arms, shoulders, and legs off the floor simultaneously. Lower back stays pressed to floor. Hold.",tip:"A gymnastics fundamental. If too hard, bend knees or keep arms at sides to reduce difficulty."},
    "cd4":{setup:"Adjust seat height so leg has slight bend at bottom of pedal stroke. Grip handlebars lightly.",move:"Pedal at your chosen resistance. Maintain consistent cadence (60-100 RPM).",tip:"Low impact on joints, making it ideal for people with knee or hip issues. Increase resistance for more challenge."},
    "cd5":{setup:"Step onto machine, grip handrails lightly for balance only. Set speed.",move:"Step continuously. Drive through full foot. Stand upright.",tip:"Don't lean on the handrails. Standing upright forces your legs to do the work and burns more calories."},
    "cd6":{setup:"Stand with feet shoulder-width. Hold one end of rope in each hand. Slight squat position.",move:"Create waves by alternating arms up and down rapidly. Keep core braced.",tip:"This is both cardio and upper body conditioning. Start with 20-second bursts, 40 seconds rest."},
    "cd7":{setup:"Stand facing a box at knee height or lower. Feet shoulder-width.",move:"Swing arms back, then explode upward, landing on top of box with both feet. Stand tall. Step down (don't jump down).",tip:"Start with a low box. Step down rather than jumping to protect your Achilles tendon."},
    "cd8":{setup:"Stand with feet shoulder-width.",move:"Drop into a squat, place hands on floor. Jump feet back to push-up position. Do a push-up. Jump feet forward. Explode upward into a jump. That's one rep.",tip:"The ultimate full-body cardio exercise. Modify by removing the push-up or the jump if needed."},

// === UTILITIES ===
function calcTDEE(w,h,a,g,act){let bmr=g==="male"?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;const m={sedentary:1.2,light:1.375,moderate:1.55,active:1.725};return Math.round(bmr*(m[act]||1.55));}
function calcMacros(cal,goal,w){const p=goal==="muscle_gain"||goal==="fat_loss"?2.0:goal==="strength"?1.8:1.6;const pr=Math.round(p*w);const f=Math.round(cal*0.28/9);const c=Math.round((cal-pr*4-f*9)/4);const result={protein:pr,carbs:c,fat:f};return result;}
function goalCalAdjust(tdee,goal){return goal==="fat_loss"?Math.round(tdee*0.8):goal==="muscle_gain"?Math.round(tdee*1.12):goal==="strength"?Math.round(tdee*1.08):goal==="recomp"?Math.round(tdee*0.95):tdee;}

function generateProgram(profile, weekNum, mesoNum){
  const week = weekNum || 1;
  const meso = mesoNum || 1;
  const isDeload = week === 4;
  const numDays=parseInt(profile.trainingDays)||4;
  const splitVariants={
    2:[[["chest","back","shoulders"],["legs","biceps","triceps"]],[["chest","triceps"],["back","biceps","shoulders","legs"]]],
    3:[[["chest","triceps","shoulders"],["back","biceps","core"],["legs","core"]],[["chest","biceps"],["back","triceps","core"],["legs","shoulders"]]],
    4:[[["chest","triceps"],["back","biceps"],["shoulders","core"],["legs","core"]],[["chest","biceps"],["back","triceps"],["legs","shoulders"],["chest","core"]],[["shoulders","triceps"],["legs","biceps"],["chest","core"],["back","shoulders"]]],
    5:[[["chest","triceps"],["back","biceps"],["shoulders","core"],["legs","core"],["chest","back"]],[["chest","biceps"],["back","triceps"],["legs"],["shoulders","core"],["chest","legs"]]],
    6:[[["chest","triceps"],["back","biceps"],["legs"],["shoulders","core"],["chest","back"],["legs","biceps"]],[["chest","shoulders"],["back","triceps"],["legs","core"],["biceps","chest"],["back","legs"],["shoulders","biceps"]]]
  };
  const variants=splitVariants[numDays]||splitVariants[4];
  const split=variants[(meso-1)%variants.length];
  const lf=profile.experience==="beginner"?["beginner"]:profile.experience==="intermediate"?["beginner","intermediate"]:["beginner","intermediate","advanced"];
  const ef=profile.equipment==="full_gym"?null:profile.equipment==="home"?["dumbbell","bodyweight"]:["bodyweight"];
  return split.map((muscles,idx)=>{
    const exs=[];
    muscles.forEach(muscleGroup=>{
      let pool=exerciseDB.filter(exItem=>exItem.muscle===muscleGroup&&lf.includes(exItem.level));
      if(ef) pool=pool.filter(exItem=>ef.includes(exItem.equipment));
      if(!pool.length) pool=exerciseDB.filter(exItem=>exItem.muscle===muscleGroup);
      const cnt=muscleGroup==="core"?2:muscles.length<=2?3:2;
      const comp=pool.filter(exItem=>exItem.type==="compound").sort(()=>Math.random()-0.5);
      const iso=pool.filter(exItem=>exItem.type!=="compound").sort(()=>Math.random()-0.5);
      const sel=[];
      for(let j=0;j<Math.min(Math.ceil(cnt*0.6),comp.length);j++) sel.push(comp[j]);
      for(let j=0;sel.length<cnt&&j<iso.length;j++) if(!sel.find(s=>s.id===iso[j].id)) sel.push(iso[j]);
      sel.forEach(exItem=>{
        // Progressive overload: week 1=baseline, week 2=+1 set, week 3=+1 set, week 4=deload (-1 set, fewer reps)
        let baseSets=profile.experience==="beginner"?3:4;
        let sets = isDeload ? Math.max(2, baseSets - 1) : baseSets + Math.max(0, week - 1);
        if(sets > 5) sets = 5;
        let reps;
        if(isDeload){
          reps = exItem.type==="compound" ? "6-8" : "10-12";
        } else {
          reps = exItem.type==="compound"?(profile.goal==="strength"?"5":"8-12"):profile.goal==="strength"?"8-10":"10-15";
        }
        exs.push({...exItem, sets: String(sets), reps});
      });
    });
    const result = {day:["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"][idx],label:muscles.map(muscleGroup=>muscleGroup[0].toUpperCase()+muscleGroup.slice(1)).join(" & "),exercises:exs};
    return result;
  });
}

function generateMealPlan(profile,targetCals){
  const dk=profile.diet||"omnivore";
  const cook=profile.cooking||"moderate";
  // Filter by cooking preference
  const cookFilter = (m) => {
    if(cook==="minimal") return m.complexity==="minimal";
    if(cook==="ready") return m.complexity==="minimal";
    if(cook==="moderate") return m.complexity!=="love";
    return true; // love cooking = all
  };
  const prepFilter = (m) => {
    if(cook==="moderate" && m.mealPrep) return true;
    return true;
  };

  return ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(day=>{
    let bf=mealDB.filter(m=>m.meal==="breakfast"&&m.diet.includes(dk)&&cookFilter(m)).sort(()=>Math.random()-0.5);
    let lu=mealDB.filter(m=>m.meal==="lunch"&&m.diet.includes(dk)&&cookFilter(m)).sort(()=>Math.random()-0.5);
    let di=mealDB.filter(m=>m.meal==="dinner"&&m.diet.includes(dk)&&cookFilter(m)).sort(()=>Math.random()-0.5);
    let sn=mealDB.filter(m=>m.meal==="snack"&&m.diet.includes(dk)&&cookFilter(m)).sort(()=>Math.random()-0.5);
    // Fallback if filters too restrictive
    if(!bf.length) bf=mealDB.filter(m=>m.meal==="breakfast"&&m.diet.includes(dk)).sort(()=>Math.random()-0.5);
    if(!lu.length) lu=mealDB.filter(m=>m.meal==="lunch"&&m.diet.includes(dk)).sort(()=>Math.random()-0.5);
    if(!di.length) di=mealDB.filter(m=>m.meal==="dinner"&&m.diet.includes(dk)).sort(()=>Math.random()-0.5);
    if(!sn.length) sn=mealDB.filter(m=>m.meal==="snack"&&m.diet.includes(dk)).sort(()=>Math.random()-0.5);

    // Find best calorie match
    let best=null,bestD=Infinity;
    for(let a=0;a<Math.min(bf.length,3);a++)for(let b=0;b<Math.min(lu.length,3);b++)for(let c=0;c<Math.min(di.length,3);c++)for(let d=0;d<Math.min(sn.length,3);d++){
      const s2=sn[(d+1)%sn.length];
      const tot=bf[a].cal+lu[b].cal+di[c].cal+sn[d].cal+s2.cal;
      const diff=Math.abs(tot-targetCals);
      if(diff<bestD){bestD=diff;best=[bf[a],lu[b],di[c],sn[d],s2];}
    }
    if(!best) best=[bf[0],lu[0],di[0],sn[0],sn[1]||sn[0]];
    const meals=[{type:"Breakfast",...best[0]},{type:"Lunch",...best[1]},{type:"Dinner",...best[2]},{type:"Snack 1",...best[3]},{type:"Snack 2",...best[4]}];
    const result = {day,meals,totalCal:meals.reduce((s,m)=>s+(m.cal||0),0),totalP:meals.reduce((s,m)=>s+(m.protein||0),0),totalC:meals.reduce((s,m)=>s+(m.carbs||0),0),totalF:meals.reduce((s,m)=>s+(m.fat||0),0)};
    return result;
  });
}

      case 2:return(<div style={{padding:"30px 24px"}}><div style={{fontSize:13,color:t.accent,fontWeight:600,marginBottom:8}}>STEP 2 OF 6</div><div style={{fontSize:24,fontWeight:700,marginBottom:20}}>Primary goal</div><div style={{display:"flex",flexDirection:"column",gap:10}}>{[{k:"fat_loss",l:"Fat Loss",d:"Lose body fat, preserve muscle"},{k:"muscle_gain",l:"Muscle Gain",d:"Build lean muscle mass"},{k:"strength",l:"Strength",d:"Get stronger on key lifts"},{k:"general_fitness",l:"General Fitness",d:"Overall health & conditioning"},{k:"recomp",l:"Body Recomp",d:"Lose fat & gain muscle"}].map(g=><button key={g.k} onClick={()=>up("goal",g.k)} style={{...ss.card,cursor:"pointer",textAlign:"left",border:profile.goal===g.k?`2px solid ${t.accent}`:`1px solid ${t.border}`,background:profile.goal===g.k?t.accentSubtle:t.bgCard}}><div style={{fontWeight:600,fontSize:15,marginBottom:2,color:t.text}}>{g.l}</div><div style={{fontSize:13,color:t.textSecondary}}>{g.d}</div></button>)}</div><button style={{...ss.btn,marginTop:20}} onClick={()=>setOnboardStep(3)}>Continue</button></div>);
      case 3:{const s3ok=!!(profile.experience&&profile.trainingDays&&profile.sessionDuration&&profile.equipment);return(<div style={{padding:"30px 24px"}}><div style={{fontSize:13,color:t.accent,fontWeight:600,marginBottom:8}}>STEP 3 OF 6</div><div style={{fontSize:24,fontWeight:700,marginBottom:20}}>Training</div><div style={{display:"flex",flexDirection:"column",gap:18}}><div><label style={ss.label}>Experience</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["beginner","Beginner"],["intermediate","Intermediate"],["advanced","Advanced"]].map(([k,l])=><button key={k} style={ss.chip(profile.experience===k)} onClick={()=>up("experience",k)}>{l}</button>)}</div></div><div><label style={ss.label}>Days/week</label><div style={{display:"flex",gap:8}}>{["2","3","4","5","6"].map(d=><button key={d} style={ss.chip(profile.trainingDays===d)} onClick={()=>up("trainingDays",d)}>{d}</button>)}</div></div><div><label style={ss.label}>Session</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{["30","45","60","75","90"].map(d=><button key={d} style={ss.chip(profile.sessionDuration===d)} onClick={()=>up("sessionDuration",d)}>{d} min</button>)}</div></div><div><label style={ss.label}>Equipment</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["full_gym","Full Gym"],["home","Home"],["bodyweight","Bodyweight"]].map(([k,l])=><button key={k} style={ss.chip(profile.equipment===k)} onClick={()=>up("equipment",k)}>{l}</button>)}</div></div></div><button style={{...ss.btn,marginTop:24,opacity:s3ok?1:0.4,cursor:s3ok?"pointer":"not-allowed"}} onClick={()=>{if(s3ok)setOnboardStep(4);}}>Continue</button></div>);}
      case 4:{const s4ok=!!(profile.diet&&profile.cooking);return(<div style={{padding:"30px 24px"}}><div style={{fontSize:13,color:t.accent,fontWeight:600,marginBottom:8}}>STEP 4 OF 6</div><div style={{fontSize:24,fontWeight:700,marginBottom:20}}>Nutrition</div><div style={{display:"flex",flexDirection:"column",gap:18}}><div><label style={ss.label}>Diet</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["omnivore","Omnivore"],["vegetarian","Vegetarian"],["vegan","Vegan"],["pescatarian","Pescatarian"],["halal","Halal"]].map(([k,l])=><button key={k} style={ss.chip(profile.diet===k)} onClick={()=>up("diet",k)}>{l}</button>)}</div></div><div><label style={ss.label}>Cooking style</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["minimal","Minimal effort"],["moderate","Meal prep"],["love","Love cooking"]].map(([k,l])=><button key={k} style={ss.chip(profile.cooking===k)} onClick={()=>up("cooking",k)}>{l}</button>)}</div><div style={{fontSize:11,color:t.textMuted,marginTop:6}}>{profile.cooking==="minimal"?"Quick, simple meals with minimal steps":profile.cooking==="moderate"?"Batch-friendly meals you can prep ahead":"Full recipes with more ingredients & techniques"}</div></div></div><button style={{...ss.btn,marginTop:24,opacity:s4ok?1:0.4,cursor:s4ok?"pointer":"not-allowed"}} onClick={()=>{if(s4ok)setOnboardStep(5);}}>Continue</button></div>);}
      case 5:{const s5ok=!!(profile.activityLevel&&profile.stepsGoal&&profile.avatarGender);return(<div style={{padding:"30px 24px"}}><div style={{fontSize:13,color:t.accent,fontWeight:600,marginBottom:8}}>STEP 5 OF 6</div><div style={{fontSize:24,fontWeight:700,marginBottom:20}}>Activity & preferences</div><div style={{display:"flex",flexDirection:"column",gap:18}}><div><label style={ss.label}>Daily activity</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["sedentary","Sedentary"],["light","Light"],["moderate","Moderate"],["active","Very Active"]].map(([k,l])=><button key={k} style={ss.chip(profile.activityLevel===k)} onClick={()=>up("activityLevel",k)}>{l}</button>)}</div></div><div><label style={ss.label}>Steps goal</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["6000","6K"],["8000","8K"],["10000","10K"],["12000","12K"],["15000","15K"]].map(([k,l])=><button key={k} style={ss.chip(profile.stepsGoal===k)} onClick={()=>up("stepsGoal",k)}>{l}</button>)}</div></div><div><label style={ss.label}>Exercise demo avatar</label><div style={{display:"flex",gap:12,justifyContent:"center",marginTop:4}}>{["male","female"].map(g=><button key={g} onClick={()=>up("avatarGender",g)} style={{background:profile.avatarGender===g?t.accentSubtle:t.bgCard,border:profile.avatarGender===g?`2px solid ${t.accent}`:`1px solid ${t.border}`,borderRadius:16,padding:"14px 20px",cursor:"pointer"}}><div style={{fontSize:24}}>{g==="male"?"🧍‍♂️":"🧍‍♀️"}</div><span style={{fontSize:12,fontWeight:600,color:profile.avatarGender===g?t.accent:t.textSecondary}}>{g==="male"?"Male":"Female"}</span></button>)}</div></div></div><button style={{...ss.btn,marginTop:24,opacity:s5ok?1:0.4,cursor:s5ok?"pointer":"not-allowed"}} onClick={()=>{if(s5ok)setOnboardStep(6);}}>Continue</button></div>);}
      case 6:{const w=parseFloat(profile.weight)||80,h=parseFloat(profile.height)||175,a=parseInt(profile.age)||25;const tdee=calcTDEE(w,h,a,profile.gender,profile.activityLevel);const gc=goalCalAdjust(tdee,profile.goal);const m=calcMacros(gc,profile.goal,w);return(<div style={{padding:"30px 24px"}}><div style={{fontSize:13,color:t.accent,fontWeight:600,marginBottom:8}}>STEP 6 OF 6</div><div style={{fontSize:24,fontWeight:700,marginBottom:20}}>Your plan, {profile.name}</div><div style={ss.ca}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}><div><div style={{fontSize:12,color:t.textMuted}}>Daily Calories</div><div style={{fontSize:22,fontWeight:700,color:t.accent}}>{gc}</div></div><div><div style={{fontSize:12,color:t.textMuted}}>Goal</div><div style={{fontSize:15,fontWeight:600}}>{gl[profile.goal]}</div></div><div><div style={{fontSize:12,color:t.textMuted}}>Protein</div><div style={{fontSize:18,fontWeight:700}}>{m.protein}g</div></div><div><div style={{fontSize:12,color:t.textMuted}}>Carbs</div><div style={{fontSize:18,fontWeight:700}}>{m.carbs}g</div></div><div><div style={{fontSize:12,color:t.textMuted}}>Fat</div><div style={{fontSize:18,fontWeight:700}}>{m.fat}g</div></div><div><div style={{fontSize:12,color:t.textMuted}}>Cooking</div><div style={{fontSize:15,fontWeight:600,textTransform:"capitalize"}}>{profile.cooking}</div></div></div></div><button style={{...ss.btn,marginTop:16}} onClick={finishOnboarding}>Launch My Program →</button></div>);}
      default:return null;
    }
  };

  if(screen==="onboarding") return(<div style={ss.app}>{onboardStep>0&&onboardStep<6&&<div style={{padding:"12px 20px",display:"flex",alignItems:"center"}}><button onClick={()=>setOnboardStep(Math.max(0,onboardStep-1))} style={{background:"none",border:"none",color:t.textSecondary,cursor:"pointer",fontSize:14,padding:"4px 8px"}}>← Back</button><div style={{flex:1,display:"flex",gap:4,justifyContent:"center"}}>{[1,2,3,4,5,6].map(i=><div key={i} style={{width:i<=onboardStep?24:16,height:4,borderRadius:2,background:i<=onboardStep?t.accent:t.bgSecondary}}/>)}</div></div>}{renderOnboard()}</div>);

  // Reusable week navigator bar
  const WeekNav = () => (
    <div style={{...ss.ca,marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>navigateWeek(-1)} style={{background:"none",border:"none",color:currentWeek===1&&currentMeso===1?t.textMuted:t.accent,fontSize:22,cursor:"pointer",padding:"4px 8px"}}>{currentWeek===1&&currentMeso===1?"":"←"}</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:t.accent}}>{mesoLabel} · {weekLabel}</div>
          <div style={{fontSize:12,color:t.textSecondary}}>{weekDescription}</div>
        </div>
        <button onClick={()=>navigateWeek(1)} style={{background:"none",border:"none",color:t.accent,fontSize:22,cursor:"pointer",padding:"4px 8px"}}>→</button>
      </div>
    </div>
  );

  // DASHBOARD
  const renderDash=()=>{
    const today=program[currentDayIdx]||program[0];
    const hour=new Date().getHours();
    const gr=hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";
    const isDone=(dn)=>completedWorkouts.some(wk=>wk.day===dn&&wk.date===todayStr());
    return(<div style={ss.pg}>
      <div style={{padding:"20px 0 8px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:14,color:t.textSecondary}}>{gr},</div><div style={{fontSize:26,fontWeight:700}}>{profile.name} 👋</div></div><div style={{fontSize:12,color:t.textMuted,textAlign:"right",paddingTop:4}}>{longDate()}</div></div>

      {/* Streak - calculated from real data */}
      {streakDays > 0 ? (
        <div style={{...ss.ca,display:"flex",alignItems:"center",gap:14}}><div style={{fontSize:32}}>🔥</div><div><div style={{fontSize:22,fontWeight:700,color:t.accent}}>{streakDays} Day Streak</div><div style={{fontSize:13,color:t.textSecondary}}>Keep it going!</div></div></div>
      ) : (
        <div style={{...ss.card,display:"flex",alignItems:"center",gap:14}}><div style={{fontSize:32}}>💪</div><div><div style={{fontSize:16,fontWeight:700}}>Start your streak today</div><div style={{fontSize:13,color:t.textSecondary}}>Complete a workout to get started.</div></div></div>
      )}

      {/* Steps Card */}
      <div style={ss.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{fontSize:13,fontWeight:600}}>Steps Today</div><div style={{fontSize:12,color:t.textMuted}}>Goal: {(parseInt(profile.stepsGoal)||10000).toLocaleString()}</div></div><div style={{fontSize:28,fontWeight:700,marginBottom:8}}>{totalSteps.toLocaleString()}</div><div style={ss.pb()}><div style={ss.pf((totalSteps/(parseInt(profile.stepsGoal)||10000))*100,t.success)}/></div></div>

      {/* Week Navigator */}
      <WeekNav />

      <div style={{marginBottom:20}}><div style={ss.st}>Today's Workout</div>{today&&<div style={{...ss.card,cursor:"pointer"}} onClick={()=>startWorkout(currentDayIdx)}><div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><div><div style={{fontSize:17,fontWeight:700}}>{today.label}</div><div style={{fontSize:13,color:t.textSecondary}}>{today.exercises?.length} exercises · ~{profile.sessionDuration} min</div></div><span style={ss.tag}>{today.day}</span></div><button style={ss.btn}>Start Workout →</button></div>}</div>
      <div style={{marginBottom:20}}><div style={ss.st}>This Week</div><div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>{program.map((programDay,idx)=><div key={idx} style={{position:"relative",minWidth:72}}>{isDone(programDay.day)&&<div style={{position:"absolute",top:3,right:3,fontSize:13,zIndex:1}}>✅</div>}<button onClick={()=>setCurrentDayIdx(idx)} onDoubleClick={()=>setShowDayPicker(idx)} style={{width:"100%",padding:"10px 8px",borderRadius:12,background:idx===currentDayIdx?t.accentSubtle:t.bgCard,border:idx===currentDayIdx?`1.5px solid ${t.accent}`:`1px solid ${t.border}`,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:11,color:idx===currentDayIdx?t.accent:t.textMuted,fontWeight:600}}>{programDay.day?.slice(0,3)}</div><div style={{fontSize:10,color:t.textSecondary,marginTop:2}}>{programDay.label?.split(" & ")[0]?.slice(0,8)}</div></button></div>)}</div><div style={{fontSize:11,color:t.textMuted,marginTop:6}}>Tap to select · Double-tap to change day</div></div>
      <div style={{marginBottom:20}}><div style={ss.st}>Today's Nutrition</div><div style={ss.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:700}}>{calories}</div><div style={{fontSize:11,color:t.textMuted}}>Cal</div></div><div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:"#E87A6A"}}>{macros.protein}g</div><div style={{fontSize:11,color:t.textMuted}}>Protein</div></div><div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:"#7EC87E"}}>{macros.carbs}g</div><div style={{fontSize:11,color:t.textMuted}}>Carbs</div></div><div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:"#E8C55A"}}>{macros.fat}g</div><div style={{fontSize:11,color:t.textMuted}}>Fat</div></div></div><button style={{...ss.bo,marginTop:4}} onClick={()=>{setScreen("meals");setTabNav("meals");}}>View Full Meal Plan</button></div></div>
      <div style={{marginBottom:20}}><div style={ss.st}>Progress Snapshot</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div style={ss.card}><div style={{fontSize:11,color:t.textMuted,marginBottom:4}}>Current Weight</div><div style={{fontSize:22,fontWeight:700}}>{getCurrentWeight().toFixed(1)} kg</div></div><div style={ss.card}><div style={{fontSize:11,color:t.textMuted,marginBottom:4}}>Workouts Done</div><div style={{fontSize:22,fontWeight:700}}>{getWorkoutCount()}</div></div><button onClick={()=>setShowStepsChart(true)} style={{...ss.card,cursor:"pointer",textAlign:"left"}}><div style={{fontSize:11,color:t.textMuted,marginBottom:4}}>Steps Today</div><div style={{fontSize:22,fontWeight:700}}>{totalSteps.toLocaleString()}</div><div style={ss.pb()}><div style={ss.pf((totalSteps/(parseInt(profile.stepsGoal)||10000))*100,t.success)}/></div></button><div style={ss.card}><div style={{fontSize:11,color:t.textMuted,marginBottom:4}}>Sleep</div><div style={{fontSize:22,fontWeight:700}}>7.2h</div></div></div></div>
    </div>);
  };

  // WORKOUT
  const renderWorkout=()=>{
    const day=program[currentDayIdx];if(!day)return(<div style={ss.pg}><WeekNav /><div style={ss.card}>No workout scheduled for this week.</div></div>);
    if(!workoutActive) return(<div style={ss.pg}><div style={{padding:"20px 0 8px"}}><div style={ss.st}>Workouts</div></div><WeekNav />{program.map((programDay,idx)=><div key={idx} style={{...ss.card,cursor:"pointer"}} onClick={()=>startWorkout(idx)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15,fontWeight:700}}>{programDay.day} — {programDay.label}</div><div style={{fontSize:12,color:t.textSecondary}}>{programDay.exercises.length} exercises · {programDay.exercises[0]?.sets} sets each</div></div><button style={ss.bs}>Start</button></div></div>)}</div>);
    const ex=day.exercises[currentExIdx];if(!ex)return null;
    const ts=parseInt(ex.sets)||3;const prog=((currentExIdx*ts+currentSetIdx)/(day.exercises.length*ts))*100;
    return(<div style={ss.pg}>
      <div style={{padding:"16px 0 8px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:12,color:t.textMuted}}>Exercise {currentExIdx+1}/{day.exercises.length}</span><span style={{fontSize:12,color:t.accent}}>{Math.round(prog)}%</span><button onClick={()=>{setWorkoutActive(false);setIsResting(false);setRestTimer(0);clearTimeout(timerRef.current);}} style={{background:"none",border:`1px solid ${t.danger}`,borderRadius:8,padding:"3px 10px",fontSize:12,color:t.danger,cursor:"pointer"}}>✕ Exit</button></div><div style={ss.pb()}><div style={ss.pf(prog)}/></div></div>
      {isResting?<div style={{...ss.ca,textAlign:"center",padding:32}}><div style={{fontSize:14,color:t.textSecondary,marginBottom:8}}>Rest</div><div style={{fontSize:56,fontWeight:800,color:t.accent}}>{Math.floor(restTimer/60)}:{String(restTimer%60).padStart(2,"0")}</div><div style={{fontSize:13,color:t.textMuted,marginBottom:20}}>Next: {currentSetIdx+1<ts?`Set ${currentSetIdx+2}`:day.exercises[currentExIdx+1]?.name||"Done"}</div><button style={ss.btn} onClick={()=>{setIsResting(false);setRestTimer(0);}}>Skip →</button></div>:(
        <>
          <div style={{...ss.card,padding:20}}>
            <div style={{fontSize:20,fontWeight:700,marginBottom:4,textAlign:"center"}}>{ex.name}</div>
            <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:8}}><span style={ss.tag}>{ex.muscle}</span><span style={ss.tag}>{ex.equipment}</span></div>
            <ExerciseDiagramPanel exercise={ex} th={t}/>
          </div>
          <div style={ss.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:15,fontWeight:700}}>Set {currentSetIdx+1}/{ts}</div>
              <button onClick={()=>setShowRestPicker(true)} style={{background:t.bgSecondary,border:`1px solid ${t.border}`,borderRadius:8,padding:"4px 10px",fontSize:12,color:t.textSecondary,cursor:"pointer"}}>Rest: {restDuration}s ⚙️</button>
            </div>
            <div style={{display:"flex",gap:12,marginBottom:16}}>
              <div style={{flex:1,background:t.bgSecondary,borderRadius:12,padding:14,textAlign:"center"}}><div style={{fontSize:11,color:t.textMuted}}>Reps</div><div style={{fontSize:24,fontWeight:700,color:t.accent}}>{ex.reps}</div></div>
              <div style={{flex:1,background:t.bgSecondary,borderRadius:12,padding:14,textAlign:"center"}}><div style={{fontSize:11,color:t.textMuted}}>RPE</div><div style={{fontSize:24,fontWeight:700,color:t.accent}}>{profile.goal==="strength"?"8-9":"7-8"}</div></div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>{Array.from({length:ts}).map((_,i)=><div key={i} style={{flex:1,height:6,borderRadius:3,background:i<currentSetIdx?t.accent:i===currentSetIdx?t.accentDark:t.bgSecondary}}/>)}</div>
            <button style={ss.btn} onClick={completeSet}>{currentSetIdx+1<ts?"Complete Set ✓":currentExIdx+1<day.exercises.length?"Next Exercise →":"Finish Workout 🎉"}</button>
          </div>
        </>
      )}
      {showRestPicker&&<div style={ss.ov} onClick={()=>setShowRestPicker(false)}><div style={ss.md} onClick={e=>e.stopPropagation()}><div style={{fontSize:18,fontWeight:700,marginBottom:16}}>Rest Period</div>{[{v:60,l:"60s",d:"Endurance — elevated heart rate"},{v:90,l:"90s",d:"Hypertrophy — muscle growth"},{v:180,l:"3 min",d:"Strength — full recovery"}].map(r=><button key={r.v} onClick={()=>{setRestDuration(r.v);setShowRestPicker(false);}} style={{...ss.card,cursor:"pointer",textAlign:"left",width:"100%",border:restDuration===r.v?`2px solid ${t.accent}`:`1px solid ${t.border}`}}><div style={{fontWeight:600}}>{r.l}</div><div style={{fontSize:12,color:t.textSecondary}}>{r.d}</div></button>)}<div style={{marginTop:8}}><label style={ss.label}>Custom (seconds)</label><div style={{display:"flex",gap:8}}><input type="number" value={restDuration} onChange={e=>setRestDuration(parseInt(e.target.value)||60)} style={{...ss.input,flex:1}}/><button style={ss.bs} onClick={()=>setShowRestPicker(false)}>Set</button></div></div></div></div>}
    </div>);
  };

  // MEALS
  const renderMeals=()=>{
    const dp=mealPlan[weeklyMealDay]||mealPlan[0];if(!dp)return null;
    return(<div style={ss.pg}>
      <div style={{padding:"20px 0 8px"}}><div style={ss.st}>Meal Plan</div></div>
      <WeekNav />
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16}}>{mealPlan.map((m,i)=><button key={i} onClick={()=>setWeeklyMealDay(i)} style={{minWidth:48,padding:"8px 6px",borderRadius:10,background:i===weeklyMealDay?t.accentSubtle:t.bgCard,border:i===weeklyMealDay?`1.5px solid ${t.accent}`:`1px solid ${t.border}`,cursor:"pointer"}}><div style={{fontSize:11,fontWeight:600,color:i===weeklyMealDay?t.accent:t.textMuted}}>{m.day?.slice(0,3)}</div></button>)}</div>
      <div style={ss.ca}><div style={{fontSize:13,fontWeight:600,marginBottom:10}}>{dp.day} — {dp.totalCal} cal</div><div style={{display:"flex",justifyContent:"space-between"}}><div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:"#E87A6A"}}>{dp.totalP}g</div><div style={{fontSize:10,color:t.textMuted}}>protein</div></div><div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:"#7EC87E"}}>{dp.totalC}g</div><div style={{fontSize:10,color:t.textMuted}}>carbs</div></div><div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:"#E8C55A"}}>{dp.totalF}g</div><div style={{fontSize:10,color:t.textMuted}}>fat</div></div></div></div>
      {dp.meals?.map((meal,i)=>{const lk=`${weeklyMealDay}-${i}`;const lg=mealLogged[lk];return(
        <div key={i} style={{...ss.card,opacity:lg?0.6:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1,cursor:"pointer"}} onClick={()=>setShowRecipe(meal)}>
              <div style={{fontSize:11,color:t.accent,fontWeight:600}}>{meal.type}</div>
              <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{meal.name}</div>
              <div style={{fontSize:12,color:t.textSecondary}}>{meal.cal} cal · P:{meal.protein}g · C:{meal.carbs}g · F:{meal.fat}g</div>
              {meal.prepMin>0&&<div style={{fontSize:11,color:t.textMuted,marginTop:2}}>⏱ {meal.prepMin} min{meal.mealPrep?" · 📦 Meal prep friendly":""}</div>}
              <div style={{fontSize:11,color:t.accent,marginTop:4}}>Tap for recipe →</div>
            </div>
            <button onClick={()=>setMealLogged(p=>({...p,[lk]:!lg}))} style={{background:lg?t.success:t.bgSecondary,color:lg?"#fff":t.textMuted,border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{lg?"✓":"Log"}</button>
          </div>
        </div>
      );})}
    </div>);
  };

  // PROGRESS
  const renderProgress=()=>{
    const chartW=350,chartH=160,chartPad=30;
    const last14=weightLog.slice(-14);
    const weightValues=last14.map(entry=>entry.weight);
    const minWeight=(weightValues.length?Math.min(...weightValues):70)-0.5;
    const maxWeight=(weightValues.length?Math.max(...weightValues):90)+0.5;
    const weightRange=maxWeight-minWeight||1;
    const chartPoints=last14.map((entry,idx)=>{
      const px=chartPad+(last14.length>1?idx/(last14.length-1):0.5)*(chartW-chartPad*2);
      const py=chartPad+(1-(entry.weight-minWeight)/weightRange)*(chartH-chartPad*2);
      return {px,py,date:entry.date,weight:entry.weight};
    });
    const linePath=chartPoints.map((pt,idx)=>`${idx===0?"M":"L"} ${pt.px} ${pt.py}`).join(" ");
    const areaPath=chartPoints.length>1?linePath+` L ${chartPoints[chartPoints.length-1].px} ${chartH-chartPad} L ${chartPoints[0].px} ${chartH-chartPad} Z`:"";
    const currentW=getCurrentWeight();
    const weightDiff=currentW-(weightValues[0]||currentW);
    const currentMeasure=measurementHistory.length?measurementHistory[measurementHistory.length-1]:bodyMeasurements;
    
    const handleChartClick=(evt)=>{
      const rect=evt.currentTarget.getBoundingClientRect();
      const clickX=(evt.clientX-rect.left)/rect.width*chartW;
      let closest=null,closestDist=Infinity;
      chartPoints.forEach(pt=>{
        const dist=Math.abs(pt.px-clickX);
        if(dist<closestDist){closestDist=dist;closest=pt;}
      });
      if(closest) setChartTooltip({date:closest.date,weight:closest.weight});
    };

    return(
      <div style={ss.pg}>
        <div style={{padding:"20px 0 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={ss.st}>Progress</div>
          <select value={progressRange} onChange={ev=>setProgressRange(ev.target.value)} style={{background:t.bgInput,color:t.text,border:`1px solid ${t.border}`,borderRadius:8,padding:"6px 10px",fontSize:12}}>
            <option value="today">Today</option>
            <option value="3m">3 months</option>
            <option value="6m">6 months</option>
            <option value="12m">12 months</option>
          </select>
        </div>

        <div style={ss.card}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontSize:15,fontWeight:700}}>Weight Trend</div>
            <div style={{fontSize:13,color:weightDiff<=0?t.success:t.warning,fontWeight:600}}>{weightDiff>0?"+":""}{weightDiff.toFixed(1)} kg</div>
          </div>
          {chartTooltip && (
            <div style={{background:t.bgSecondary,border:`1px solid ${t.accentBorder}`,borderRadius:8,padding:"6px 10px",fontSize:12,marginBottom:8,textAlign:"center"}}>
              <b>{chartTooltip.date}</b> — <span style={{color:t.accent}}>{chartTooltip.weight.toFixed(1)} kg</span>
            </div>
          )}
          <svg viewBox={`0 0 ${chartW} ${chartH}`} style={{width:"100%",cursor:"crosshair"}} onClick={handleChartClick}>
            {[0,0.25,0.5,0.75,1].map((pct,idx)=>{
              const yPos=chartPad+pct*(chartH-chartPad*2);
              return (
                <g key={idx}>
                  <line x1={chartPad} y1={yPos} x2={chartW-chartPad} y2={yPos} stroke={t.border} strokeWidth={0.5} />
                  <text x={chartPad-4} y={yPos+4} textAnchor="end" fill={t.textMuted} fontSize={9}>{(maxWeight-pct*weightRange).toFixed(1)}</text>
                </g>
              );
            })}
            {areaPath && <path d={areaPath} fill={`${t.accent}15`} />}
            {linePath && <path d={linePath} fill="none" stroke={t.accent} strokeWidth={2.5} strokeLinecap="round" />}
            {chartPoints.map((pt,idx)=>(
              <circle key={idx} cx={pt.px} cy={pt.py} r={3} fill={t.accent} />
            ))}
            {chartPoints.filter((_,idx)=>idx%3===0).map((pt,idx)=>(
              <text key={idx} x={pt.px} y={chartH-8} textAnchor="middle" fill={t.textMuted} fontSize={8}>{pt.date.slice(5)}</text>
            ))}
          </svg>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={ss.card}>
            <div style={{fontSize:11,color:t.textMuted}}>Current</div>
            <div style={{fontSize:20,fontWeight:700}}>{currentW.toFixed(1)} kg</div>
          </div>
          <div style={ss.card}>
            <div style={{fontSize:11,color:t.textMuted}}>Sessions</div>
            <div style={{fontSize:20,fontWeight:700}}>{getWorkoutCount()}</div>
          </div>
        </div>

        <div style={{marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={ss.st}>Body Measurements</div>
          <button style={ss.bs} onClick={()=>setShowMeasureEdit(true)}>Update</button>
        </div>
        <div style={ss.card}>
          {[{l:"Chest",k:"chest"},{l:"Waist",k:"waist"},{l:"Arms",k:"arms"},{l:"Thighs",k:"thighs"}].map((mItem,idx)=>(
            <div key={idx} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:idx<3?`1px solid ${t.border}`:"none"}}>
              <span style={{color:t.textSecondary}}>{mItem.l}</span>
              <span style={{fontWeight:600}}>{currentMeasure[mItem.k]?`${currentMeasure[mItem.k]} cm`:"—"}</span>
            </div>
          ))}
        </div>

        <div style={ss.card}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>Log Weight ({todayStr()})</div>
          <div style={{display:"flex",gap:10}}>
            <input type="number" step="0.1" placeholder="e.g. 79.5" value={weightInput} onChange={ev=>setWeightInput(ev.target.value)} style={{...ss.input,flex:1}} />
            <button style={ss.bs} onClick={logWeight}>Log</button>
          </div>
        </div>

        <div style={{marginTop:8}}>
          <div style={ss.st}>Workout History</div>
          {completedWorkouts.length===0 ? (
            <div style={{...ss.card,color:t.textMuted}}>No workouts yet.</div>
          ) : (
            completedWorkouts.slice().reverse().slice(0,10).map((wk,idx)=>(
              <div key={idx} style={{...ss.card,padding:12}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontWeight:700}}>{wk.label}</div>
                    <div style={{fontSize:12,color:t.textSecondary}}>{wk.day} · {wk.date}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:600}}>{Math.floor(wk.duration/60)}:{String(wk.duration%60).padStart(2,"0")}</div>
                    <div style={{fontSize:11,color:t.textMuted}}>{wk.exercises} exercises</div>
                  </div>
                </div>
              </div>
            ))
          )}
        </div>
      </div>
    );
  };

  // SETTINGS
  const renderSettings=()=>{
    const recCals=goalCalAdjust(calcTDEE(parseFloat(profile.weight)||80,parseFloat(profile.height)||175,parseInt(profile.age)||25,profile.gender,profile.activityLevel),profile.goal);
    const dev=Math.abs((calories-recCals)/recCals*100);const cc=dev<=15?t.success:dev<=30?t.warning:t.danger;
    return(<div style={ss.pg}>
      <div style={{padding:"20px 0 8px"}}><div style={ss.st}>Settings</div></div>
      <div style={ss.card}><div style={{fontSize:15,fontWeight:700,marginBottom:14}}>Appearance</div><div style={{display:"flex",gap:10}}>{["dark","light"].map(th=><button key={th} onClick={()=>setTheme(th)} style={{flex:1,padding:"14px",borderRadius:12,background:theme===th?t.accentSubtle:t.bgSecondary,border:theme===th?`2px solid ${t.accent}`:`1px solid ${t.border}`,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:18}}>{th==="dark"?"🌙":"☀️"}</div><div style={{fontSize:13,fontWeight:600,color:theme===th?t.accent:t.textSecondary}}>{th==="dark"?"Dark":"Light"}</div></button>)}</div></div>
      <div style={ss.card}><div style={{fontSize:15,fontWeight:700,marginBottom:14}}>Units</div><div style={{display:"flex",gap:10}}>{["metric","imperial"].map(u=><button key={u} onClick={()=>setUnits(u)} style={{flex:1,...ss.chip(units===u)}}>{u==="metric"?"Metric (g)":"Imperial (oz)"}</button>)}</div></div>
      <div style={ss.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><div style={{fontSize:15,fontWeight:700}}>Profile</div><button style={ss.bs} onClick={()=>setEditProfile(!editProfile)}>{editProfile?"Save":"Edit"}</button></div>{editProfile?<div style={{display:"flex",flexDirection:"column",gap:12}}>{[{k:"name",l:"Name"},{k:"age",l:"Age"},{k:"height",l:"Height (cm)"},{k:"weight",l:"Weight (kg)"}].map(f=><div key={f.k}><label style={ss.label}>{f.l}</label><input style={ss.input} value={profile[f.k]} onChange={e=>up(f.k,e.target.value)}/></div>)}<div><label style={ss.label}>Goal</label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{[["fat_loss","Fat Loss"],["muscle_gain","Muscle Gain"],["strength","Strength"],["general_fitness","Fitness"],["recomp","Recomp"]].map(([k,l])=><button key={k} style={ss.chip(profile.goal===k)} onClick={()=>up("goal",k)}>{l}</button>)}</div></div></div>:<div>{[{l:"Name",v:profile.name},{l:"Goal",v:profile.goal.replace(/_/g," ")},{l:"Days",v:`${profile.trainingDays}/week`},{l:"Diet",v:profile.diet},{l:"Cooking",v:profile.cooking}].map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<4?`1px solid ${t.border}`:"none"}}><span style={{color:t.textSecondary}}>{it.l}</span><span style={{fontWeight:600,textTransform:"capitalize"}}>{it.v}</span></div>)}</div>}</div>
      <div style={ss.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><div style={{fontSize:15,fontWeight:700}}>Nutrition</div><button style={ss.bs} onClick={()=>setEditNutrition(!editNutrition)}>{editNutrition?"Save":"Edit"}</button></div>{editNutrition?<div style={{display:"flex",flexDirection:"column",gap:14}}><div><div style={{display:"flex",justifyContent:"space-between"}}><label style={ss.label}>Calories: {calories}</label><span style={{fontSize:12,color:t.textMuted}}>Rec: {recCals}</span></div><input type="range" min={Math.round(recCals*0.6)} max={Math.round(recCals*1.4)} value={calories} onChange={e=>setCalories(parseInt(e.target.value))} style={{width:"100%",accentColor:cc}}/><div style={{padding:"8px 12px",borderRadius:8,background:t.bgSecondary,border:`1px solid ${cc}30`,marginTop:6}}><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:"50%",background:cc}}/><span style={{fontSize:12,fontWeight:600,color:cc}}>{dev<=15?"Recommended":dev<=30?"Caution":"Warning"}</span></div><div style={{fontSize:11,color:t.textSecondary}}>{dev<=15?"Based on your inputs — optimal for your goal.":dev<=30?"May impact results or sustainability.":"Risk of muscle loss, fatigue, or poor adherence."}</div></div></div>{[{k:"protein",l:"Protein (g)"},{k:"carbs",l:"Carbs (g)"},{k:"fat",l:"Fat (g)"}].map(f=><div key={f.k}><label style={ss.label}>{f.l}</label><input type="number" style={ss.input} value={macros[f.k]} onChange={e=>setMacros(p=>({...p,[f.k]:parseInt(e.target.value)||0}))}/></div>)}</div>:<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{[{l:"Calories",v:calories},{l:"Protein",v:`${macros.protein}g`},{l:"Carbs",v:`${macros.carbs}g`},{l:"Fat",v:`${macros.fat}g`}].map((it,i)=><div key={i} style={{background:t.bgSecondary,borderRadius:10,padding:12,textAlign:"center"}}><div style={{fontSize:11,color:t.textMuted}}>{it.l}</div><div style={{fontSize:18,fontWeight:700}}>{it.v}</div></div>)}</div>}</div>
    </div>);
  };

  const NI=({type,active})=>{
    const c=active?t.accent:t.textMuted;
    const icons = {
      dashboard:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
      workout:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M6 5v14M18 5v14M6 12h12M3 8v8M21 8v8"/></svg>,
      meals:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>,
      progress:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>,
      settings:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
    };
    return icons[type] || null;
  };

  return(<div style={ss.app}>
    
    <div style={{padding:"16px 20px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${t.border}`}}><div style={{fontSize:22,fontWeight:700,color:t.accent}}>FitHaus</div><div style={{width:32,height:32,borderRadius:"50%",background:t.accentSubtle,border:`1.5px solid ${t.accentBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:t.accent}}>{profile.name?.[0]?.toUpperCase()||"?"}</div></div>
    {tabNav==="dashboard"&&renderDash()}
    {tabNav==="workout"&&renderWorkout()}
    {tabNav==="meals"&&renderMeals()}
    {tabNav==="progress"&&renderProgress()}
    {tabNav==="settings"&&renderSettings()}
    <div style={ss.nav}>{[{k:"dashboard",l:"Home"},{k:"workout",l:"Workout"},{k:"meals",l:"Meals"},{k:"progress",l:"Progress"},{k:"settings",l:"Settings"}].map(i=><button key={i.k} style={ss.nb(tabNav===i.k)} onClick={()=>{setTabNav(i.k);setScreen(i.k);}}><NI type={i.k} active={tabNav===i.k}/><span>{i.l}</span></button>)}</div>

    {/* MODALS */}
    {showCompletionPopup&&<div style={ss.ov} onClick={()=>setShowCompletionPopup(null)}><div style={{...ss.md,textAlign:"center"}} onClick={e=>e.stopPropagation()}><div style={{fontSize:48,marginBottom:8}}>🎉</div><div style={{fontSize:24,fontWeight:800,color:t.accent}}>Well Done, {profile.name}!</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"20px 0"}}><div style={{background:t.bgSecondary,borderRadius:12,padding:14}}><div style={{fontSize:11,color:t.textMuted}}>Duration</div><div style={{fontSize:22,fontWeight:700}}>{Math.floor(showCompletionPopup.duration/60)}:{String(showCompletionPopup.duration%60).padStart(2,"0")}</div></div><div style={{background:t.bgSecondary,borderRadius:12,padding:14}}><div style={{fontSize:11,color:t.textMuted}}>Exercises</div><div style={{fontSize:22,fontWeight:700}}>{showCompletionPopup.exercises}</div></div><div style={{background:t.bgSecondary,borderRadius:12,padding:14}}><div style={{fontSize:11,color:t.textMuted}}>Sets</div><div style={{fontSize:22,fontWeight:700}}>{showCompletionPopup.sets}</div></div><div style={{background:t.bgSecondary,borderRadius:12,padding:14}}><div style={{fontSize:11,color:t.textMuted}}>Group</div><div style={{fontSize:14,fontWeight:700}}>{showCompletionPopup.label}</div></div></div><button style={ss.btn} onClick={()=>setShowCompletionPopup(null)}>Close</button></div></div>}
    {showDayPicker!==null&&<div style={ss.ov} onClick={()=>setShowDayPicker(null)}><div style={ss.md} onClick={e=>e.stopPropagation()}><div style={{fontSize:18,fontWeight:700,marginBottom:16}}>Change day for: {program[showDayPicker]?.label}</div>{["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(d=><button key={d} onClick={()=>{const np=[...program];np[showDayPicker]={...np[showDayPicker],day:d};setProgram(np);setShowDayPicker(null);}} style={{...ss.card,cursor:"pointer",textAlign:"left",width:"100%",border:program[showDayPicker]?.day===d?`2px solid ${t.accent}`:`1px solid ${t.border}`}}><div style={{fontWeight:600}}>{d}</div></button>)}</div></div>}
    {showRecipe&&<div style={ss.ov} onClick={()=>setShowRecipe(null)}><div style={ss.md} onClick={e=>e.stopPropagation()}><div style={{fontSize:18,fontWeight:700,marginBottom:2}}>{showRecipe.name}</div><div style={{fontSize:12,color:t.textSecondary,marginBottom:16}}>{showRecipe.cal} cal · P:{showRecipe.protein}g · C:{showRecipe.carbs}g · F:{showRecipe.fat}g{showRecipe.prepMin>0?` · ⏱ ${showRecipe.prepMin} min`:""}</div>{showRecipe.ingredients&&<><div style={{fontSize:14,fontWeight:700,color:t.accent,marginBottom:8}}>Ingredients</div><ul style={{margin:"0 0 16px 0",padding:"0 0 0 18px"}}>{showRecipe.ingredients.map((ing,i)=><li key={i} style={{fontSize:13,color:t.textSecondary,marginBottom:4}}>{ing.item} — <span style={{fontWeight:600,color:t.text}}>{gUnit(ing.g,ing.oz)}</span></li>)}</ul></>}{showRecipe.method&&<><div style={{fontSize:14,fontWeight:700,color:t.accent,marginBottom:8}}>Method</div>{showRecipe.method.map((step,i)=><div key={i} style={{fontSize:13,color:t.textSecondary,marginBottom:8,display:"flex",gap:8}}><div style={{minWidth:20,height:20,borderRadius:"50%",background:t.accentSubtle,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:t.accent}}>{i+1}</div><div>{step}</div></div>)}</>}<button style={{...ss.btn,marginTop:12}} onClick={()=>setShowRecipe(null)}>Close</button></div></div>}
    {showMeasureEdit&&<div style={ss.ov} onClick={()=>setShowMeasureEdit(false)}><div style={ss.md} onClick={e=>e.stopPropagation()}><div style={{fontSize:18,fontWeight:700,marginBottom:16}}>Update Measurements</div>{[{k:"chest",l:"Chest (cm)"},{k:"waist",l:"Waist (cm)"},{k:"arms",l:"Arms (cm)"},{k:"thighs",l:"Thighs (cm)"}].map(f=><div key={f.k} style={{marginBottom:12}}><label style={ss.label}>{f.l}</label><input type="number" style={ss.input} value={bodyMeasurements[f.k]} onChange={e=>setBodyMeasurements(p=>({...p,[f.k]:e.target.value}))}/></div>)}<button style={{...ss.btn,marginTop:8}} onClick={()=>{setMeasurementHistory(p=>[...p,{date:todayStr(),...bodyMeasurements}]);setShowMeasureEdit(false);}}>Save</button></div></div>}
    {showStepsChart&&<div style={ss.ov} onClick={()=>setShowStepsChart(false)}><div style={{...ss.md,maxWidth:400}} onClick={e=>e.stopPropagation()}><div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Steps Today</div><div style={{fontSize:24,fontWeight:800,color:t.accent,marginBottom:16}}>{totalSteps.toLocaleString()} <span style={{fontSize:14,fontWeight:400,color:t.textMuted}}>/ {(parseInt(profile.stepsGoal)||10000).toLocaleString()}</span></div><svg viewBox="0 0 360 160" style={{width:"100%"}}>{stepsData.map((d,i)=>{const mx=Math.max(...stepsData.map(s=>s.steps),1);const bH=(d.steps/mx)*110;return<g key={i}><rect x={i*15+2} y={140-bH} width={12} height={bH} rx={3} fill={t.accent} opacity={0.8}/>{i%4===0&&<text x={i*15+8} y={155} textAnchor="middle" fill={t.textMuted} fontSize={8}>{d.hour}:00</text>}</g>;})}</svg><button style={{...ss.btn,marginTop:16}} onClick={()=>setShowStepsChart(false)}>Close</button></div></div>}
  </div>);
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(FitHaus));
</script>
</body>
</html>
